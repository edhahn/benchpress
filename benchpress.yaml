test:
  num_requests: 20
  concurrency: 3
  interval_ms: 500
  timeout_s: 120
  max_tokens: 1024
  temperature: 0.0
  seed: 42

report:
  results_dir: "./results"
  report_path: "./reports"
  llm_provider: "anthropic-direct"
  llm_model: "claude-sonnet-4-5"
