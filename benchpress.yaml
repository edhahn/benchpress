providers:
  - name: "anthropic-direct"
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"
    insights_context: "Direct connection to Anthropic's API with no middleware or additional processing."
    models:
      - id: "claude-opus-4-6"
        display_name: "Opus 4.6"
        base_model: "claude-opus-4-6"
        cost_per_1k_input: 0.015
        cost_per_1k_output: 0.075
      - id: "claude-opus-4-5"
        display_name: "Opus 4.5"
        base_model: "claude-opus-4-5"
        cost_per_1k_input: 0.015
        cost_per_1k_output: 0.075
      - id: "claude-sonnet-4-6"
        display_name: "Sonnet 4.6"
        base_model: "claude-sonnet-4-6"
        cost_per_1k_input: 0.003
        cost_per_1k_output: 0.015
      - id: "claude-sonnet-4-5"
        display_name: "Sonnet 4.5"
        base_model: "claude-sonnet-4-5"
        cost_per_1k_input: 0.003
        cost_per_1k_output: 0.015
      - id: "claude-haiku-4-5"
        display_name: "Haiku 4.5"
        base_model: "claude-haiku-4-5"
        cost_per_1k_input: 0.0008
        cost_per_1k_output: 0.004

  - name: "gloo-ai"
    base_url: "https://platform.ai.gloo.com/ai/v2/"
    insights_context: |
      Gloo AI provides faith-based guardrails and prompt enhancements 
      for the faith ecosystem. When comparing metrics, acknowledge the 
      value these safety features add beyond raw performance numbers.
    oauth:
      token_url: "https://platform.ai.gloo.com/oauth2/token"
      client_id_env: "GLOO_AI_CLIENT_ID"
      client_secret_env: "GLOO_AI_CLIENT_SECRET"
      scopes: ["api/access"]
      auth_method: "basic"
    insights_context: |
      Gloo AI provides faith-based guardrails and prompt enhancements for the
      faith ecosystem. When comparing metrics, acknowledge the value these safety
      features and content filtering add beyond raw performance numbers.
    models:
      - id: "gloo-anthropic-claude-opus-4.6"
        display_name: "Gloo AI - Opus 4.6"
        base_model: "claude-opus-4-6"
        cost_per_1k_input: 0.00532
        cost_per_1k_output: 0.02743
      - id: "gloo-anthropic-claude-opus-4.5"
        display_name: "Gloo AI - Opus 4.5"
        base_model: "claude-opus-4-5"
        cost_per_1k_input: 0.00532
        cost_per_1k_output: 0.02743
      - id: "gloo-anthropic-claude-sonnet-4.6"
        display_name: "Gloo AI - Sonnet 4.6"
        base_model: "claude-sonnet-4-6"
        cost_per_1k_input: 0.00321
        cost_per_1k_output: 0.01646
      - id: "gloo-anthropic-claude-sonnet-4.5"
        display_name: "Gloo AI - Sonnet 4.5"
        base_model: "claude-sonnet-4-5"
        cost_per_1k_input: 0.00321
        cost_per_1k_output: 0.01646
      - id: "gloo-anthropic-claude-haiku-4.5"
        display_name: "Gloo AI - Haiku 4.5"
        base_model: "claude-haiku-4-5"
        cost_per_1k_input: 0.0011
        cost_per_1k_output: 0.00549

